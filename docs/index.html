<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Redirecting...</title>
  <meta name="description" content="We’ve moved! Redirecting you to our new site. Click below if the redirect doesn’t happen automatically.">
  <link rel="canonical" href="https://vishnukm.vercel.app">

  <!-- Open Graph -->
  <meta property="og:title" content="We’ve Moved! 🚀">
  <meta property="og:description" content="Visit our new home on the web!">
  <meta property="og:url" content="https://vishnukm.vercel.app">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://vishnukm.vercel.app/your-thumbnail.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="We’ve Moved! 🚀">
  <meta name="twitter:description" content="Visit our new home on the web!">
  <meta name="twitter:image" content="https://vishnukm.vercel.app/your-thumbnail.jpg">

  <!-- Auto Redirect -->
  <meta http-equiv="refresh" content="3; URL=hhttps://vishnukm.vercel.app">

  <!-- Fallback JS Redirect -->
  <script>
    setTimeout(() => {
      window.location.href = "https://vishnukm.vercel.app";
    }, 3000);
  </script>

  <style>
    /* Global Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }
    
    /* Dark Mode Background */
    body {
      background-color: #121212;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    
    /* Container Styling */
    .container {
      max-width: 500px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    /* Heading */
    h1 {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* Text */
    p {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    /* Redirect Button */
    .redirect-link {
      text-decoration: none;
      background: #ff7b00;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      display: inline-block;
      transition: all 0.3s ease;
    }

    .redirect-link:hover {
      background: #ff5500;
    }

    /* Loading Spinner */
    .spinner {
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top: 4px solid #ff7b00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>We’ve Moved! 🚀</h1>
    <p>You’ll be redirected in a moment...</p>
    <div class="spinner"></div>
    <p>If nothing happens, click below:</p>
    <a class="redirect-link" href="https://vishnukm.vercel.app">Go to New Site</a>
  </div>
</body>
</html>
